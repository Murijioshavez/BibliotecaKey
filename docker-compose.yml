services:
  app:
    image: biblioteca-key:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "8.3"
        NODE_VERSION: "22"
    command:
      - sh
      - -c
      - php artisan serve --host=0.0.0.0 --port=$${PORT:-8000}
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8000}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      PHP_UPLOAD_MAX_FILESIZE: 128M
    volumes:
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - app_storage:/var/www/html/storage

  queue:
    image: biblioteca-key:local
    command:
      - php
      - artisan
      - queue:work
      - --sleep=3
      - --tries=3
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
    volumes:
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - app_storage:/var/www/html/storage
    depends_on:
      - app

  schedule:
    image: biblioteca-key:local
    command:
      - php
      - artisan
      - schedule:work
    restart: unless-stopped
    env_file:
      - .env
    environment:
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
    volumes:
      - ./database/database.sqlite:/var/www/html/database/database.sqlite
      - app_storage:/var/www/html/storage
    depends_on:
      - app

volumes:
  app_storage:
